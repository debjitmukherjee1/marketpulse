name: Deploy to GitHub Pages

# Publishes site/ to GitHub Pages. Runs on every push to main that touches
# site/ from a real human commit -- a GITHUB_TOKEN-authored push (like the
# daily-update.yml bot's commit) does NOT trigger this (GitHub suppresses
# that chaining), which is why daily-update.yml deploys Pages inline itself
# instead of relying on this workflow. This one only covers direct pushes,
# or manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
